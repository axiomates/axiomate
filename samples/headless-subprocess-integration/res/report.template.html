<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>__REPORT_TITLE__</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-alt: #fbfcfd;
      --border: #d6dde5;
      --text: #16202a;
      --muted: #5a6a78;
      --same: #17603a;
      --same-bg: #dcfce7;
      --diff: #991b1b;
      --diff-bg: #fee2e2;
      --uncertain: #854d0e;
      --uncertain-bg: #fef3c7;
      --error-bg: #fff7ed;
      --error-border: #fed7aa;
      --error-text: #9a3412;
      --code-bg: #f8fafc;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .page {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    h1, h2, h3 {
      margin: 0 0 12px;
      line-height: 1.2;
    }
    h1 { font-size: 28px; }
    h2 { font-size: 18px; }
    h3 { font-size: 15px; }
    .muted { color: var(--muted); }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .stat {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: var(--panel-alt);
    }
    .stat-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
    }
    .pair-list {
      display: grid;
      gap: 16px;
    }
    .pair-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--panel);
    }
    .pair-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .pair-title {
      display: grid;
      gap: 4px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge.same { background: var(--same-bg); color: var(--same); }
    .badge.different { background: var(--diff-bg); color: var(--diff); }
    .badge.uncertain { background: var(--uncertain-bg); color: var(--uncertain); }
    .pair-body {
      padding: 18px;
      display: grid;
      gap: 18px;
    }
    .two-col {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .source-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }
    .source-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: var(--panel-alt);
    }
    .source-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .path, .block {
      border-radius: 10px;
      padding: 10px 12px;
      background: var(--code-bg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .kv {
      display: grid;
      gap: 8px;
    }
    .kv-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 10px;
      align-items: start;
    }
    .kv-key {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .image {
      margin-top: 12px;
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      display: block;
    }
    .error-list {
      display: grid;
      gap: 10px;
    }
    .error-item {
      border: 1px solid var(--error-border);
      background: var(--error-bg);
      color: var(--error-text);
      border-radius: 10px;
      padding: 12px;
    }
    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .footer-note {
      color: var(--muted);
      font-size: 12px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="panel">
      <div class="topline">
        <div>
          <h1>__REPORT_TITLE__</h1>
          <div class="muted">__META_LINE__</div>
        </div>
      </div>
      <div class="summary-grid">
        __SUMMARY_CARDS__
      </div>
    </section>
    <section class="panel">
      <h2>Pairs</h2>
      <div class="pair-list">
        __PAIR_CARDS__
      </div>
      <div class="footer-note">This HTML file is self-contained and fully prerendered. You can open it directly from the filesystem.</div>
    </section>
  </div>
</body>
</html>
